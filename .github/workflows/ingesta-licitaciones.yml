name: ingesta-licitaciones

on:
  schedule:
    - cron: '0 5 * * *'   # ~01:00 Chile (nocturna; licitaciones tienen plazos de días)
  workflow_dispatch: {}

# Grupo compartido para trabajos que usan la API v1 con el mismo ticket
# (throttle 2s): no corren en simultáneo y no se pisan el rate limit.
concurrency:
  group: ingesta-v1
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      MP_TICKET_V1:              ${{ secrets.MP_TICKET_V1 }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run ingesta:licitaciones
