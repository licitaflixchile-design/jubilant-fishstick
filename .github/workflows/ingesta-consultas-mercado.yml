name: ingesta-consultas-mercado

# Consultas al Mercado (RFI). API pública sin ticket → no comparte
# rate limit con nada; corre a la par de compra-agil.
on:
  schedule:
    - cron: '5 0,11,17 * * *'   # ~20:05 / 07:05 / 13:05 Chile (invierno UTC-4)
  workflow_dispatch: {}

concurrency:
  group: ingesta-consultas-mercado
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run ingesta:consultas-mercado
